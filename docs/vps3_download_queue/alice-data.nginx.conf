# This file is a server{} fragment only.
# Add the following line to /etc/nginx/nginx.conf inside the global http {} block
# before enabling this site:
# limit_conn_zone $binary_remote_addr zone=per_ip:10m;
#
# Do not place limit_conn_zone inside this server{} file. nginx will reject it.
server {
    listen 443 ssl http2;
    server_name dl.aliceprotocol.org;

    ssl_certificate /etc/letsencrypt/live/dl.aliceprotocol.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dl.aliceprotocol.org/privkey.pem;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    location = /models/queue/status {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /models/queue {
        proxy_pass http://127.0.0.1:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/models/(?<model_file>v[0-9]+_full\.pt)$ {
        auth_request /internal/auth/verify;
        error_page 403 = @queue_required;
        error_page 500 502 503 504 = /_internal/models/$model_file$is_args$args;

        alias /data/models/$model_file;
        limit_conn per_ip 1;
        limit_rate_after 100m;
        limit_rate 15m;
    }

    location ~ ^/_internal/models/(?<internal_model_file>v[0-9]+_full\.pt)$ {
        internal;
        alias /data/models/$internal_model_file;
        limit_conn per_ip 1;
        limit_rate_after 100m;
        limit_rate 15m;
    }

    location @queue_required {
        default_type application/json;
        return 403 '{"error":"download_token_required","message":"POST /models/queue to obtain a full-model download slot."}';
    }

    location = /internal/auth/verify {
        internal;
        proxy_pass http://127.0.0.1:8095/auth/verify?token=$arg_token&uri=$request_uri;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Original-URI $request_uri;
        proxy_read_timeout 2s;
        proxy_connect_timeout 2s;
    }

    location /models/ {
        alias /data/models/;
        limit_conn per_ip 4;
        limit_rate_after 100m;
        limit_rate 15m;
    }

    location /shards/ {
        alias /data/shards/;
        limit_conn per_ip 8;
    }

    location /epoch_updates/ {
        alias /data/epoch_updates/;
        limit_conn per_ip 4;
        limit_rate_after 50m;
        limit_rate 30m;
    }

    location /data/ {
        alias /data/;
        limit_conn per_ip 4;
    }
}
